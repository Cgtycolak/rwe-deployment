services:
  # Web service
  - type: web
    name: flask-energy-app
    env: python
    buildCommand: |
      pip install -r requirements.txt
      export FLASK_APP=app
      flask db upgrade
    startCommand: gunicorn --config gunicorn_config.py wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PRODUCTION_DATABASE_URL
        fromDatabase:
          name: rwe-postgres
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: rwe-postgres
          property: connectionString
      - key: USE_LOCAL_DB
        value: false
      - key: FLASK_APP
        value: app
      # EPIAS API credentials
      - key: USERNAME
        sync: false
      - key: PASSWORD
        sync: false
      # Session / auth
      - key: SECRET_KEY
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      # CORS — set to the deployed frontend origin
      - key: ALLOWED_ORIGINS
        sync: false
      # Supabase analytics store
      - key: SUPABASE_USER
        sync: false
      - key: SUPABASE_PASSWORD
        sync: false
      # Meteologica solar data
      - key: XTRADERS_USERNAME
        sync: false
      - key: XTRADERS_PASSWORD
        sync: false
      # Modal.com Chronos inference endpoint
      - key: MODAL_CHRONOS_URL
        sync: false
      # Email reports
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASSWORD
        sync: false
      - key: RECIPIENT_EMAILS
        sync: false

  # Scheduler worker service
  - type: worker
    name: flask-energy-scheduler
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler_service.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PRODUCTION_DATABASE_URL
        fromDatabase:
          name: rwe-postgres
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: rwe-postgres
          property: connectionString
      - key: USE_LOCAL_DB
        value: false
      # EPIAS API credentials
      - key: USERNAME
        sync: true
      - key: PASSWORD
        sync: true
      # Session / auth (scheduler creates the Flask app, which requires these)
      - key: SECRET_KEY
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      # Supabase analytics store
      - key: SUPABASE_USER
        sync: false
      - key: SUPABASE_PASSWORD
        sync: false
      # Meteologica solar data
      - key: XTRADERS_USERNAME
        sync: false
      - key: XTRADERS_PASSWORD
        sync: false
      # Email reports
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASSWORD
        sync: false
      - key: RECIPIENT_EMAILS
        sync: false

databases:
  - name: rwe-postgres
    databaseName: rwe_data
    user: rwe_user
    plan: free
    # WARNING: ipAllowList: [] allows connections from all IPs.
    # Migrate to Render Private Networking (dashboard → Database → Private URL)
    # so only services in this account can reach the DB port.
    ipAllowList: []
